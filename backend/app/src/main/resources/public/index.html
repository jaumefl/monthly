<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monthly</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
    <h1>Monthly</h1>
    <div class="month-picker">
        <label for="month">Month</label>
        <input type="month" id="month" />
    </div>
</header>

<main>
    <!-- Import -->
    <section class="card import-card">
        <h2>Import statement</h2>
        <div class="import-row">
            <select id="bank">
                <option value="santander">Santander</option>
                <option value="revolut">Revolut</option>
            </select>
            <input type="file" id="file" />
            <button id="import-btn">Import</button>
        </div>
        <p id="import-status" class="status"></p>
    </section>

    <!-- Summary -->
    <section class="summary">
        <div class="card stat">
            <span class="stat-label">Income</span>
            <span class="stat-value income" id="income">—</span>
        </div>
        <div class="card stat">
            <span class="stat-label">Expenses</span>
            <span class="stat-value expense" id="expenses">—</span>
        </div>
        <div class="card stat">
            <span class="stat-label">Net</span>
            <span class="stat-value" id="net">—</span>
        </div>
    </section>

    <!-- Transactions -->
    <section class="card">
        <h2>Transactions</h2>
        <table id="tx-table">
            <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Source</th>
                <th class="num">Amount</th>
            </tr>
            </thead>
            <tbody id="tx-body"></tbody>
        </table>
        <p id="tx-empty" class="status" hidden>No transactions for this month.</p>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
